{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center w-100">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 text-center">
            <div class="card-body">
                <div class="mb-3">
                    <img src="https://cdn-icons-png.flaticon.com/512/2919/2919600.png" width="60" alt="Lock Icon">
                </div>
                <h3>2FA Verification</h3>
                <p class="text-muted">Enter the dynamic code from your authenticator app.</p>
                
                <form method="POST">
                    <div class="mb-3">
                        <input type="text" name="otp" class="form-control text-center form-control-lg" placeholder="000 000" autocomplete="off" autofocus required style="letter-spacing: 5px; font-weight: bold;">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Verify Identity</button>
                    </div>
                </form>
                <div class="mt-3">
                    <a href="{{ url_for('logout') }}" class="text-decoration-none small text-muted">Cancel Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
