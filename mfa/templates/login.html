{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center w-100">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 shadow-lg border-0">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="fs-2">🎓</i>
                    </div>
                    <h3 class="mt-3 fw-bold">Student Login</h3>
                    <p class="text-muted">Secure Access Portal</p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control border-start-0 bg-light" placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control border-start-0 bg-light" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">Sign In</button>
                    </div>
                </form>
                
                <hr class="my-4">

                <div class="text-center">
                    <p class="small text-muted mb-2">New to the portal?</p>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-success btn-sm px-4">Create New Account</a>
                </div>

                <div class="mt-4 text-center">
                    <div class="p-2 bg-light rounded border border-dashed">
                        <small class="text-secondary text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">
                            Verification Mode: <strong>Two-Factor (TOTP)</strong>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
