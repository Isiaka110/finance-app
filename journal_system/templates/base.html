<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Online Journal System</title>
    <style>
        .progress-label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">OJMS Portal</a>
            
            <div class="navbar-nav ms-auto align-items-center">
                {% if user.is_authenticated %}
                    <span class="nav-item text-white-50 me-3">
                        <small>Logged in as: <strong>{{ user.username }}</strong> ({{ user.get_role_display }})</small>
                    </span>
                    <a href="{% url 'dashboard' %}" class="btn btn-sm btn-outline-light me-2">Dashboard</a>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-danger">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="nav-link">Login</a>
                    <a href="{% url 'register' %}" class="btn btn-primary btn-sm ms-2">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="container text-center mt-5 py-3 text-muted border-top">
        <small>&copy; 2026 Online Journal Management System</small>
    </footer>
</body>
</html>
