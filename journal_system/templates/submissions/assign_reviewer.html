{% extends 'base.html' %}
{% block content %}
<h3>Assign Reviewer for: {{ manuscript.title }}</h3>
<form method="post">
    {% csrf_token %}
    <select name="reviewer" class="form-select mb-3">
        {% for r in reviewers %}
            <option value="{{ r.id }}">{{ r.username }} (Expertise: {{ r.expertise }})</option>
        {% endfor %}
    </select>
    <button type="submit" class="btn btn-primary">Confirm Assignment</button>
</form>
{% endblock %}
