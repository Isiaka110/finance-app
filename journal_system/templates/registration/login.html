{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <form method="post" class="card p-4">
            {% csrf_token %}
            <h3 class="text-center">Login</h3>
            {{ form.as_p }}
            <button type="submit" class="btn btn-dark">Login</button>
        </form>
    </div>
</div>
{% endblock %}
